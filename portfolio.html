<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amarograph — Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="cur-wrap" style="position:fixed;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);will-change:transform">
  <canvas id="cur-canvas" width="54" height="54" style="display:block"></canvas>
</div>
<canvas id="neon-border"></canvas>
<canvas id="hexbg"></canvas>
<nav class="Z">
  <a href="index.html" class="logo" style="text-decoration:none">Amarograph</a>
  <ul class="navl">
    <li><a href="services.html">Services</a></li>
    <li><a href="portfolio.html" class="active">Portfolio</a></li>
    <li><a href="boutique.html">Boutique</a></li>
    <li><a href="about.html">À propos</a></li>
    <li><a href="#" onclick="chatToggle();return false;">Contact</a></li>
  </ul>
</nav>
<!-- PORTFOLIO -->
<div class="secw" id="portfolio"><section>
  <span class="slbl" id="txt-portfolio-label">Réalisations</span>
  <h2 class="stit" id="txt-portfolio-title">Le <span>portfolio</span></h2>
  <div class="pf" id="port-filter">
    <button class="fb active" onclick="pfFilter('all',this)">Tout</button>
    <button class="fb" onclick="pfFilter('vetement',this)">Vêtements</button>
    <button class="fb" onclick="pfFilter('livery',this)">Livery</button>
    <button class="fb" onclick="pfFilter('mapping',this)">Mapping</button>
    <button class="fb" onclick="pfFilter('design',this)">Design</button>
  </div>
  <div class="pg-photos" id="portfolio-grid">
    <div class="pg-empty" id="port-empty">Aucune création pour l'instant — revenez bientôt !</div>
  </div>
</section></div>

<footer>
  <span class="flogo">Amarograph</span>
  
  <span class="fr">© Amarograph 2025</span>
</footer>
<!-- CHAT WIDGET -->
<div id="chat-bubble" onclick="chatToggle()" title="Nous contacter">
  <div id="chat-notif"></div>
  <svg viewBox="0 0 24 24" fill="none" stroke="#00AAFF" stroke-width="1.5">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    <line x1="9" y1="10" x2="15" y2="10" stroke="#CC0020" stroke-width="1"/>
    <line x1="9" y1="13" x2="13" y2="13" stroke="#00AAFF" stroke-width="1"/>
  </svg>
</div>

<div id="chat-window">
  <div class="chat-head">
    <div class="chat-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00AAFF" stroke-width="1.5">
        <polygon points="12,2 22,7 22,17 12,22 2,17 2,7"/>
        <circle cx="12" cy="12" r="3" fill="rgba(0,170,255,.2)" stroke="#00AAFF" stroke-width="1"/>
      </svg>
    </div>
    <div class="chat-head-info">
      <div class="chat-head-name">Amarograph</div>
      <div class="chat-head-status">En ligne &mdash; repond vite</div>
    </div>
    <button class="chat-close" onclick="chatToggle()">&times;</button>
  </div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="chat-msg bot">Salut ! Decris-moi ton projet et je te reponds rapidement.</div>
    <div class="chat-typing" id="chat-typing"><span></span><span></span><span></span></div>
  </div>
  <div class="chat-name-row">
    <input type="text" id="chat-pseudo" placeholder="Ton pseudo / Discord (ex: pseudo#0000)" maxlength="60">
  </div>
  <div class="chat-foot">
    <textarea id="chat-input" placeholder="Ton message..." rows="1"
      oninput="this.style.height='38px';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="chat-send" onclick="chatSend()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="lbClose()">&times;</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">&#8249;</button>
  <button class="lb-nav lb-next" onclick="lbNav(1)">&#8250;</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <span class="lb-counter" id="lb-counter"></span>
  <div class="lb-info">
    <p class="lb-name" id="lb-name"></p>
    <p class="lb-desc" id="lb-desc"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
